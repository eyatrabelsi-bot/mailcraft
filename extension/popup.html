<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 220px;
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      padding: 14px;
      margin: 0;
      color: #202124;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 6px;
    }
    p {
      font-size: 12px;
      color: #5f6368;
      margin: 0;
      line-height: 1.4;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34a853;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <h1><span class="dot"></span>MailCraft AI</h1>
  <p>Runs automatically on mail.google.com — badges appear next to inbox rows, no action needed here.</p>
</body>
</html>
